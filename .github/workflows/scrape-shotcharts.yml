name: Scrape NHL EDGE Shot Charts
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install requests
      - name: Lancer le scraper NHL EDGE
        run: python nhl_edge_shotchart.py
      - name: Commit et push les JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: mise à jour shot charts NHL EDGE $(date +'%Y-%m-%d')"
          git push
